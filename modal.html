<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/d35eaeeb6f.js" crossorigin="anonymous"></script>

    <style>
        img{
            max-width: 100%;
        }
    </style>
</head>
<body>
    <!-- Button trigger modal -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
  Launch demo modal
</button>

<!-- Modal -->
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="prod_modal" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="prod_modal">Modal title</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
       <section id="product_data">

<div class="row">
    <div class="col-6">
        <img src="../banana.jfif" alt="" id="prod_img">
    </div>
    <div class="col-6 row flex-column">
        <p id="prod_name">Banana</p>
        <p id="prod_des">Fresh fruit healthy and good before sleeping</p>
    </div>
</div>



       </section>
      </div>
      <div class="modal-footer">
        <div class="product-actions">
                    <button class="action-btn" title="Quick View" >
                        <i class="fas fa-eye"></i>
                    </button>
                    <button class="action-btn" title="Add to Cart" >
                        <i class="fas fa-shopping-cart"></i>
                    </button>
                    <button class="action-btn" title="Add to Wishlist" >
                        <i class="fas fa-heart"></i>
                    </button>
                </div>
      </div>
    </div>
  </div>
</div>



    
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>  
<script src="modal.js"></script>
</body>
</html>
