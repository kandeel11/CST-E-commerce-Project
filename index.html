            margin: 0 0 10px;

        p {
            margin: 0 0 16px;
            line-height: 1.5;
        }

        ul {
            margin: 0;
            padding-left: 18px;
            columns: 2;
            column-gap: 24px;
        }

        li {
            margin: 0 0 8px;
        }

        a {
            color: #0a7f2e;
            text-decoration: none;
            font-weight: 600;
        }

        a:hover {
            text-decoration: underline;
        }

        code {
            background: #eef3f7;
            padding: 2px 6px;
            border-radius: 6px;

    </main>

    <script>
        (function () {
            const routes = {
                home: "Pages/Home.html",
                aboutus: "Pages/AboutUs.html",
                admin: "Pages/Admin.html",
                cart: "Pages/Cart.html",
                checkout: "Pages/Checkout.html",
                contactus: "Pages/ContactUs.html",
                customer: "Pages/Customer.html",
                forgetpassword: "Pages/Forgetpassword.html",
                login: "Pages/Login.html",
                product: "Pages/Product.html",
                productdetails: "Pages/ProductDetails.html",
                register: "Pages/Register.html",
                seller: "Pages/Seller.html",
                userdashboard: "Pages/userdashboard.html",
                wishlist: "Pages/WishList.html",
                navbar: "Pages/NavBar.html",
                footer: "Pages/Footer.html"
            };

            const params = new URLSearchParams(window.location.search);
            const raw = (params.get("route") || params.get("page") || "").trim().toLowerCase();

            if (!raw) {
                window.location.replace(routes.home);
                return;
            }
            const route = raw.endsWith(".html") ? raw.slice(0, -5) : raw;
            const target = routes[route];

            if (target) {
                window.location.replace(target);
            }
        })();
    </script>
