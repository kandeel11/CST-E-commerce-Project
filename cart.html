<html>

<head>
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="cart.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>

<body>
    <h2 class="text-center mt-3">My Shopping Cart</h2>
    <section class="container">
        <div class="row">
            <div id="table" class="col-md-12 col-lg-7 mb-md-4 me-lg-3">
                <table class="text-center" width="100%">
                    <tr>
                        <th>PRODUCT</th>
                        <th>PRICE</th>
                        <th>QUANTITY</th>
                        <th>SUBTOTAL</th>
                    </tr>
                    <tbody>
                        
                    </tbody>
                    <tfoot>
                        <td colspan="4" class="text-start"><button id="returnbtn">Return to shop</button></td>
                    </tfoot>
                </table>
            </div>

            <div class=" col-md-12 col-lg-4" id="totaldiv">

                <table width="100%">
                    <tr>
                        <th colspan="3">Cart Total</th>
                    </tr>
                    <tr>

                        <td colspan="2">Subtotal:</td>
                        <td id="subtotal" class="totalcart"></td>
                    </tr>
                    <tr>
                        <td colspan="2">Shipping:</td>
                        <td class="totalcart">Free</td>
                    </tr>
                    <tr class="last">
                        <td colspan="2">Total:</td>
                        <td id="total" class="totalcart"></td>
                    </tr>
                </table>
                <button class="btn btn-success btntotal mt-3">Procced to checkout</button>
            </div>
        </div>
    </section>
    <div class="toast-container position-fixed bottom-0 end-0 p-3 mb-5">
                            <div id="myToast" class="toast align-items-center text-bg-success border-0" role="alert">
                                <div class="d-flex">
                                    <div class="toast-body">
                                        Out of stock. You can't add more of this item.</div>
                                    <button type="button" class="btn-close btn-close-white me-2 m-auto"
                                        data-bs-dismiss="toast"></button>
                                </div>
                            </div>
                        </div>
                         <div class="toast-container position-fixed bottom-0 end-0 p-3 mb-5">
                            <div id="myToastt" class="toast align-items-center text-bg-success border-0" role="alert">
                                <div class="d-flex">
                                    <div class="toast-body">
                                        You need at least 1 item in your cart.</div>
                                    <button type="button" class="btn-close btn-close-white me-2 m-auto"
                                        data-bs-dismiss="toast"></button>
                                </div>
                            </div>
                        </div>
    <!-- <section class="row mx-5 mt-3">
            <div class="col-8">
                <label>Coupon Code<input type="text" placeholder="Enter Code"></label>
            </div>
        </section> -->
    <script src="cart.js" type="module" defer></script>
</body>

</html>
