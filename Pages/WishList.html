<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WishList</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/d35eaeeb6f.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../Css/Home.css">
    <link rel="stylesheet" href="../Css/WishList.css">
</head>

<body>

    <div id="navbar-placeholder" class="navbar-placeholder" style="z-index: 1020;"></div>

    <div class="container text-center">
        <h3 class="text-center fw-bolder my-5">My wishlist</h3>
        <!--table-->
        <div class="wishlist-container border rounded bg-white mx-auto mb-5" style="max-width: 1000px;">
            <!-- Header -->
            <div class="row m-0 border-bottom py-3 text-muted text-uppercase"
                style="font-size: 0.85rem; font-weight: 500;">
                <div class="col-5 ps-4">PRODUCT</div>
                <div class="col-2">PRICE</div>
                <div class="col-3">STOCK STATUS</div>
                <div class="col-2"></div>
            </div>

            <!-- Products -->
            <section id="table_data">
            </section>

            <!-- Share -->
            <div class="d-flex align-items-center m-0 py-3 px-4 border-top">
                <span class="fw-bold me-3 text-dark">Share:</span>
                <a href="#" class="share-icon fb"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="#" class="share-icon twitter"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="#" class="share-icon pinterest"><i class="fa-brands fa-pinterest-p"></i></a>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


    <script src="../Js/NavBar.js"></script>
    <script src="../Js/WishList.js"></script>
</body>

</html>
