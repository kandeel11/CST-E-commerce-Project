<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../Styles/Login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="../Css/Register.css">
    <script type="module" src="../Js/Register.js"></script>
</head>

<body>

    <div class="container">
        <div class="login-form">
            <h2>Register Form</h2>
        </div>
    </div>


    <div id="section-settings" class="content-section  display-flex flex-column gap-4 p-4">
        <div class="row g-4">

            <!-- Account Settings -->
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="fw-bold mb-3">Account Information</h5>
                        <form id="accountForm" class="row g-3">
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">First Name</label>
                                <input type="text" class="form-control" id="FirstName" placeholder="First Name">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Last Name</label>
                                <input type="text" class="form-control" id="LastName" placeholder="Last Name">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Email</label>
                                <input type="email" class="form-control" id="Email" placeholder="Email">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Role</label>
                                <select id="role" name="role" class="form-control" required>
                                    <option value="" disabled selected>Select Role</option>
                                    <option value="Seller">Seller</option>
                                    <option value="User">User</option>
                                </select>
                            </div>


                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Phone</label>
                                <input type="tel" class="form-control" id="Phone" placeholder="Phone Number">
                            </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <h5 class="fw-bold mb-3">Address</h5>
                        <div id="accountForm">
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Street</label>
                                <input type="text" class="form-control" id="Street" placeholder="Street Address">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">City</label>
                                <input type="text" class="form-control" id="City" placeholder="City">
                            </div>
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Country</label>
                                <input type="text" class="form-control" id="Country" value="Egypt" disabled>
                            </div>


                        </div>
                    </div>
                </div>
                <div class="col-12 mt-4">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <div id="passwordForm" class="row g-3">

                                <div class="col-md-6">
                                    <label class="form-label small fw-semibold">Password</label>
                                    <input type="password" class="form-control" id="Password"
                                        placeholder="New Password">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-semibold">Confirm Password</label>
                                    <input type="password" class="form-control" id="confirmPassword1"
                                        placeholder="Confirm Password">
                                </div>
                                <div class="col-12">
                                    <button type="submit"
                                        class="btn btn-success rounded-pill px-4 w-100">Register</button>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>

            </form>




        </div>
        <div
            class="toast-container position-fixed bottom-0 end-0 p-3 position-absolute top-0 start-50 translate-middle-x">

            <div id="liveToast" class="toast align-items-center" role="alert" aria-live="assertive" aria-atomic="true"
                data-bs-delay="3000">
                <div class="d-flex">
                    <div class="toast-body">
                    </div>
                    <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"
                        aria-label="Close"></button>
                </div>
            </div>
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
                integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
                crossorigin="anonymous"></script>



</body>

</html>
