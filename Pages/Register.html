<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="../Styles/Login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="../Css/Register.css">
    <script type="module" src="../Js/Register.js"></script>
</head>

<body>

    <div class="container">
        <div class="login-form">
            <h2>sign Up</h2>
            <form action="#" method="post">
                <div class="form-group">
                    <input type="text" id="name" name="name" class="form-control" placeholder="Name" required>
                    <div class="error-message" id="nameError"></div>
                </div>
                <div class="form-group">
                    <input type="text" id="email" name="email" class="form-control" placeholder="Email" required>
                    <div class="error-message" id="emailError"></div>
                </div>
                <div class="form-group">
                    <select id="role" name="role" class="form-control" required>
                        <option value="" disabled selected>Select Role</option>
                        <option value="Seller">Seller</option>
                        <option value="User">User</option>
                </div>
                <div class="form-group" style="margin-bottom:0px ;">
                    <input type="password" id="password" name="password" class="form-control  " placeholder="Password"
                        required>
                    <i class="far fa-eye" id="togglePassword" style="cursor: pointer; margin-left: -30px;"></i>
                    <div class="error-message" id="passwordError"></div>

                </div>
                <div class="form-group" style="margin-top:0px ;">
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-control  "
                        placeholder="Confirm Password" required>
                    <i class="far fa-eye" id="toggleConfirmPassword" style="cursor: pointer; margin-left: -30px;"></i>
                    <div class="error-message" id="confirmPasswordError"></div>

                </div>


                <button type="submit" class="btn" id="loginButton">Register</button>
            </form>
            <p class="register-link">Already have an account <a
                    style="text-decoration: none; font-weight:700; color: black;" href="Login.html ">Login</a>
            </p>
        </div>
    </div>



</body>

</html>
