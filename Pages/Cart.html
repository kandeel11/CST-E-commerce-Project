<html>

<head>
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="../Css/Cart.css">
    <link rel="stylesheet" href="../Css/Home.css"> <!-- for navbar -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div id="navbar-placeholder" class="navbar-placeholder" style="z-index: 1020;"></div>
    <h2 class="text-center mt-3">My Shopping Cart</h2>
    <section class="container">
        <div class="row">
            <div id="table" class="col-md-12 col-lg-7 mb-md-4 me-lg-3">
                <table class="text-center" width="100%">
                    <tr>
                        <th>PRODUCT</th>
                        <th>PRICE</th>
                        <th>QUANTITY</th>
                        <th>SUBTOTAL</th>
                    </tr>
                    <tbody>

                    </tbody>
                    <tfoot>
                        <td colspan="4" class="text-start"><button id="returnbtn">Return to shop</button></td>
                    </tfoot>
                </table>
            </div>

            <div class=" col-md-12 col-lg-4" id="totaldiv">

                <table width="100%">
                    <tr>
                        <th colspan="3">Cart Total</th>
                    </tr>
                    <tr>

                        <td colspan="2">Subtotal:</td>
                        <td id="subtotal" class="totalcart"></td>
                    </tr>
                    <tr>
                        <td colspan="2">Shipping:</td>
                        <td class="totalcart">Free</td>
                    </tr>
                    <tr class="last">
                        <td colspan="2">Total:</td>
                        <td id="total" class="totalcart"></td>
                    </tr>
                </table>
                <button class="btn btn-success btntotal mt-3">Procced to checkout</button>
            </div>
        </div>
    </section>
    <!-- <section class="row mx-5 mt-3">
            <div class="col-8">
                <label>Coupon Code<input type="text" placeholder="Enter Code"></label>
            </div>
        </section> -->
    <div id="footer-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../Js/NavBar.js"></script>
    <script src="../Js/Cart.js"></script>
    <script>
        fetch('NavBar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-placeholder').innerHTML = data;
                if (window.initNavBarAuth) window.initNavBarAuth();
                if (window.initBreadcrumb) window.initBreadcrumb();
                if (window.updateCartBadge) window.updateCartBadge();
            });
        fetch('Footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            });
    </script>
</body>

</html>
