<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link rel="stylesheet" href="../Css/cart.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="cart-header">
        <i class="bi bi-cart3 cart-header-icon"></i>
        <h2>My Shopping Cart</h2>
    </div>
    <section class="container">
        <div class="row">
            <div id="table" class="col-md-12 col-lg-7 mb-md-4 me-lg-3">
                <table class="text-center" width="100%">
                    <tr>
                        <th>PRODUCT</th>
                        <th>PRICE</th>
                        <th>QUANTITY</th>
                        <th>SUBTOTAL</th>
                        <th></th>
                    </tr>
                    <tbody>

                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="5" class="text-start">
                                <button id="returnbtn">
                                    <i class="bi bi-arrow-left"></i> Return to shop
                                </button>
                            </td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <div class="col-md-12 col-lg-4" id="totaldiv">
                <table width="100%">
                    <tr>
                        <th colspan="3"><i class="bi bi-receipt"></i> Cart Total</th>
                    </tr>
                    <tr>
                        <td colspan="2">Subtotal:</td>
                        <td id="subtotal" class="totalcart"></td>
                    </tr>
                    <tr>
                        <td colspan="2">Shipping:</td>
                        <td class="totalcart"><span class="badge-free">Free</span></td>
                    </tr>
                    <tr class="last">
                        <td colspan="2">Total:</td>
                        <td id="total" class="totalcart total-price"></td>
                    </tr>
                </table>
                <button class="btn btn-success btntotal mt-3">
                    <i class="bi bi-lock-fill"></i> Proceed to checkout
                </button>
            </div>
        </div>
    </section>
    <script src="../Js/Cart.js" type="module" defer></script>
</body>

</html>
