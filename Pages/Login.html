<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../Styles/Login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../Css/Home.css">
    <link rel="stylesheet" href="../Css/Login.css">
    <script type="module" src="../Js/Login.js"></script>
</head>

<body>
    <div id="navbar-placeholder" class="navbar-placeholder" style="z-index: 1020;"></div>

    <div class="container" id="login-container">
        <div class="login-form">
            <div
                class="toast-container position-fixed bottom-0 end-0 p-3 position-absolute top-0 start-50 translate-middle-x">

                <div id="liveToast" class="toast align-items-center" role="alert" aria-live="assertive"
                    aria-atomic="true" data-bs-delay="3000">
                    <div class="d-flex">
                        <div class="toast-body">
                        </div>
                        <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"
                            aria-label="Close"></button>
                    </div>
                </div>

            </div>

            <h2>sign In</h2>
            <form action="#" method="post">
                <div class="form-group">
                    <input type="text" id="email" name="email" class="form-control" placeholder="Email" required>
                    <div class="error-message" id="emailError"></div>
                </div>
                <div class="form-group">
                    <input type="password" id="password" name="password" class="form-control  " placeholder="Password"
                        required>
                    <i class="far fa-eye" id="togglePassword" style="cursor: pointer; margin-left: -30px;"></i>
                    <div class="error-message" id="passwordError"></div>

                </div>
                <div class="form-group"
                    style="display: flex; align-items: center; justify-content: flex-start; margin: 0px 20px; position: relative; top: -15px;">
                    <input type="checkbox" id="rememberMe"> <label style="margin: 0px 5px;" for="rememberMe">Remember
                        me</label>
                    <a href="Forgetpassword.html" style="margin-left: 200px; text-decoration: none; color: gray;">Forgot
                        Password?</a>
                </div>
                <button type="submit" class="btn" id="loginButton">Login</button>
            </form>
            <p class="register-link">Don't have an account? <a
                    style="text-decoration: none; font-weight:700; color: black;" href="Register.html ">Register</a>
            </p>
        </div>
    </div>
    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
