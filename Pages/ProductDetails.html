<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details — Ecobazar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../Css/Product.css">

    <style>
        /* Only what Bootstrap cannot do on this page */
        .details-img { max-height: 340px; object-fit: contain; }
        .stars       { color: #f5a623; letter-spacing: 1px; }
        .qty-input   { width: 56px; text-align: center; }
    </style>
</head>
<body class="bg-light">

<!-- ── NAVBAR ──────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold fs-5 text-dark d-flex align-items-center gap-2" href="Home.html">
            <i class="fas fa-leaf text-success"></i> Ecobazar
        </a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav mx-auto gap-1">
                <li class="nav-item"><a class="nav-link rounded-pill px-3" href="Home.html">Home</a></li>
                <li class="nav-item"><a class="nav-link rounded-pill px-3" href="Product.html">Shop</a></li>
                <li class="nav-item"><a class="nav-link rounded-pill px-3" href="Wishlist.html">Wishlist</a></li>
                <li class="nav-item"><a class="nav-link rounded-pill px-3" href="Cart.html">Cart</a></li>
            </ul>
            <div class="d-flex align-items-center gap-3">
                <a href="Cart.html" class="position-relative text-dark text-decoration-none">
                    <i class="fas fa-shopping-cart fs-5"></i>
                    <span id="cartCount"
                          class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-success"
                          style="font-size:.65rem">0</span>
                </a>
                <a href="Login.html" class="btn btn-success btn-sm rounded-pill px-3">
                    <i class="fas fa-user me-1"></i> Login
                </a>
            </div>
        </div>
    </div>
</nav>

<!--  PAGE HEADER  -->
<section class="page-header">
    <div class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-2 small">
                <li class="breadcrumb-item"><a href="Home.html">Home</a></li>
                <li class="breadcrumb-item"><a href="Product.html">Shop</a></li>
                <li class="breadcrumb-item active" id="breadcrumbName">Product</li>
            </ol>
        </nav>
        <h1 class="fw-bold mb-0" id="pageTitle">Product Details</h1>
    </div>
</section>

<!--  MAIN  -->
<main class="container py-4">
    <div id="productDetails"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
import { getProductById, toggleWishlist, isInWishlist, addToCart, getCartCount } from "../Js/services/storageService.js";

const container = document.getElementById("productDetails");
const cartBadge = document.getElementById("cartCount");

const pPrice = p => parseFloat(p.price || p.productPrice || 0);
const pImg   = p => (p.images && p.images[0]) || p.imageUrl || "https://placehold.co/400x300/e8f5e9/2e7d32?text=Product";
const stars  = r => "★".repeat(Math.floor(r)) + "☆".repeat(5 - Math.floor(r));

function updateCartBadge() {
    if (cartBadge) cartBadge.textContent = getCartCount();
}

const params    = new URLSearchParams(window.location.search);
const productId = params.get("id");

updateCartBadge();

if (!productId) {
    container.innerHTML = `
        <div class="text-center py-5 text-muted">
            <h4>No product specified</h4>
            <a href="Product.html" class="btn btn-success rounded-pill px-4 mt-3">Back to Shop</a>
        </div>`;
} else {
    const p = getProductById(productId);

    if (!p) {
        container.innerHTML = `
            <div class="text-center py-5 text-muted">
                <i class="fas fa-box-open fa-3x mb-3 d-block"></i>
                <h4>Product not found</h4>
                <p class="small">It may have been removed or the link is incorrect.</p>
                <a href="Product.html" class="btn btn-success rounded-pill px-4">Back to Shop</a>
            </div>`;
    } else {
        const name     = p.name || p.productName || "Product";
        const price    = pPrice(p);
        const image    = pImg(p);
        const rating   = p.rating || 4;
        const inStock  = (p.stockQuantity || p.stock || 1) > 0;
        const wishlisted = isInWishlist(productId);

        document.getElementById("pageTitle").textContent    = name;
        document.getElementById("breadcrumbName").textContent = name;
        document.title = `${name} — Ecobazar`;

        container.innerHTML = `
            <div class="card border-0 shadow-sm rounded-3 overflow-hidden">
                <div class="row g-0">

                    <!-- Image -->
                    <div class="col-md-5 bg-light d-flex align-items-center justify-content-center p-4">
                        <img src="${image}" alt="${name}" class="details-img img-fluid rounded-2">
                    </div>

                    <!-- Info -->
                    <div class="col-md-7 p-4">
                        <span class="text-success fw-semibold text-uppercase small"
                              style="letter-spacing:1px">${p.category || ""}</span>

                        <h2 class="fw-bold mt-1 mb-2">${name}</h2>

                        <div class="d-flex align-items-center gap-2 mb-3">
                            <span class="stars">${stars(rating)}</span>
                            <span class="text-muted small">(${rating.toFixed(1)})</span>
                        </div>

                        <div class="mb-3">
                            <span class="fs-4 fw-bold text-success">EGP ${price.toFixed(2)}</span>
                            ${p.originalPrice
                                ? `<span class="text-muted text-decoration-line-through ms-2 small">
                                       EGP ${p.originalPrice.toFixed(2)}
                                   </span>`
                                : ""}
                        </div>

                        <p class="text-muted mb-4">${p.description || p.productDescription || "No description available."}</p>

                        <!-- Meta -->
                        <ul class="list-unstyled small text-muted mb-4">
                            <li class="mb-1">
                                <i class="fas fa-tag text-success me-2"></i>
                                Category: <strong>${p.category || "N/A"}</strong>
                            </li>
                            <li class="mb-1">
                                <i class="fas fa-box text-success me-2"></i>
                                Stock:
                                ${inStock
                                    ? `<strong class="text-success">${p.stockQuantity || p.stock || "Available"}</strong>`
                                    : `<strong class="text-danger">Out of Stock</strong>`}
                            </li>
                            ${p.organic || p.isOrganic
                                ? `<li><i class="fas fa-seedling text-success me-2"></i>Certified Organic</li>`
                                : ""}
                        </ul>

                        <!-- Qty + Actions -->
                        ${inStock ? `
                        <div class="d-flex align-items-center gap-2 mb-3">
                            <label class="fw-semibold small mb-0">Qty:</label>
                            <div class="input-group input-group-sm" style="width:110px">
                                <button class="btn btn-outline-secondary" id="qtyMinus">−</button>
                                <input type="number" id="qtyDisplay" class="form-control qty-input"
                                       value="1" min="1" max="99" readonly>
                                <button class="btn btn-outline-secondary" id="qtyPlus">+</button>
                            </div>
                        </div>` : ""}

                        <div class="d-flex gap-2 flex-wrap">
                            ${inStock
                                ? `<button class="btn btn-success px-4" id="addCartBtn">
                                       <i class="fas fa-cart-plus me-2"></i>Add to Cart
                                   </button>`
                                : `<button class="btn btn-secondary px-4" disabled>
                                       <i class="fas fa-ban me-2"></i>Out of Stock
                                   </button>`}
                            <button class="btn ${wishlisted ? "btn-danger" : "btn-outline-danger"} px-3"
                                    id="wishlistBtn" title="${wishlisted ? "Remove from Wishlist" : "Add to Wishlist"}">
                                <i class="${wishlisted ? "fas" : "far"} fa-heart"></i>
                            </button>
                            <a href="Product.html" class="btn btn-outline-secondary btn-sm ms-auto align-self-center">
                                <i class="fas fa-arrow-left me-1"></i> Back
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        `;

        // Quantity
        let qty = 1;
        const qtyEl = document.getElementById("qtyDisplay");
        document.getElementById("qtyMinus")?.addEventListener("click", () => { if (qty > 1) qtyEl.value = --qty; });
        document.getElementById("qtyPlus")?.addEventListener("click",  () => { qtyEl.value = ++qty; });

        // Add to cart
        document.getElementById("addCartBtn")?.addEventListener("click", () => {
            for (let i = 0; i < qty; i++) addToCart(p);
            updateCartBadge();
            const btn = document.getElementById("addCartBtn");
            btn.innerHTML = `<i class="fas fa-check me-2"></i>Added!`;
            btn.classList.replace("btn-success", "btn-secondary");
            setTimeout(() => {
                btn.innerHTML = `<i class="fas fa-cart-plus me-2"></i>Add to Cart`;
                btn.classList.replace("btn-secondary", "btn-success");
            }, 1500);
        });

        // Wishlist
        document.getElementById("wishlistBtn").addEventListener("click", () => {
            const btn  = document.getElementById("wishlistBtn");
            const icon = btn.querySelector("i");
            const added = toggleWishlist(p);
            icon.className    = added ? "fas fa-heart" : "far fa-heart";
            btn.className     = `btn ${added ? "btn-danger" : "btn-outline-danger"} px-3`;
            btn.title         = added ? "Remove from Wishlist" : "Add to Wishlist";
        });
    }
}
</script>
</body>
</html>
