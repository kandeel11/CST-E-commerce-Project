<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../Css/Admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <title>Admin Page</title>
</head>
<body>
   <section class="all">
    <h2 class="mt-1">Dashboard Overview</h2>

    <section class="row g-3 mb-4">
        <div class="col-sm-12 col-md-6 col-lg-3 ">
            <div class="box d-flex gap-2">
                <i class="bi bi-people" id="userssymbol"></i>
            <div class="d-flex flex-column">
            <span class="title">Total Users</span>
            <span class="num">1</span>
            </div>
            </div>
        </div>

        <div class="col-sm-12 col-md-6 col-lg-3 ">
           <div class="box d-flex gap-2">
             <i class="bi bi-shop" id="shopsymbol"></i>
            <div class="d-flex flex-column">
            <span class="title">Total Sellers</span>
            <span class="num">0</span>
            </div>
           </div>
        </div>

        <div class="col-sm-12 col-md-6 col-lg-3 ">
           <div class="box d-flex gap-2">
             <i class="bi bi-cart" id="cartsymbol"></i>
                <div class="d-flex flex-column">
            <span class="title">Total Orders</span>
            <span class="num">2</span>
            </div>
           </div>
        </div>

        <div class="col-sm-12 col-md-6 col-lg-3 ">
           <div class="box d-flex gap-2">
            <i class="bi bi-currency-dollar" id="dollarsymbol"></i>
            <div class="d-flex flex-column">
            <span class="title">Total Revenue</span>
            <span class="num">2</span>
            </div>
           </div>
        </div>
    </section>
    <section class="row gap-4">
        <div class="first col-md-12 col-lg-8 ms-2">

        </div>
        <div class="last col-md-12 col-lg-3">
          
        </div>
    </section>
</section>
    
</body>
</html>
