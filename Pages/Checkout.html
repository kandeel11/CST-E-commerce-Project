<html>

<head>
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <style>
   
body {
    background-color: #f8f9fa;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #333;
}

        #summarydiv {
            border: 1px solid #ccc;
            border-radius: 30px;
            padding: 20px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        h6 {
            color: rgb(161, 161, 161);
            padding: 5px;
            font-weight: bold;
        }

        #summarydiv tbody tr {
            border-bottom: 1px solid #ccc;
        }
        #summarydiv tbody tr:last-child {
            border-bottom: none;
        }

        .form {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        #titlecart {
            color: rgb(161, 161, 161);
            padding: 5px;
        }

        #secondtable td {
            padding: 10px;
        }
        #secondtable tr:hover{
            background-color: #eceaea;
        }
        .container {
            margin: auto;
            margin-top: 40px;
        }
    </style>
</head>

<body>
    <section class="container">
       <div class="row">
          <div class="col-6" id="summarydiv">
             <h6>Order Summary</h6>
                <table width="100%">
                    <tbody id="tablebody">

                    </tbody>
                </table>
                <table width="100%" class="mt-3" id="secondtable">
                    <tr>
                        <th colspan="3" id="titlecart">Cart Total: </th>
                    </tr>
                    <tr>
                        <td colspan="2">Shipping:</td>
                        <td class="totalcart">Free</td>
                    </tr>
                    <tr class="last">
                        <td colspan="2">Total:</td>
                        <td id="total" class="totalcart"></td>
                    </tr>
                </table>
          </div>
        
          <form class="col-6 needs-validation form" novalidate>

    <h4>Billing Information</h4>

    <div class="row g-3">

        <div class="col-6">
            <label for="firstName" class="form-label">First name</label>
            <input type="text" class="form-control" id="firstName" required>
        </div>

        <div class="col-6">
            <label for="lastName" class="form-label">Last name</label>
            <input type="text" class="form-control" id="lastName" required>
        </div>

        <div class="col-6">
            <label for="city" class="form-label">City</label>
            <select class="form-select" id="city" required>
                <option selected disabled value="">Choose...</option>
                <option>Cairo</option>
                <option>Alex</option>
                <option>Gharbia</option>
                <option>Mansoura</option>
            </select>
        </div>
         <div class="col-6">
            <label for="lastName" class="form-label">Country</label>
            <input type="text" class="form-control" id="Country" value="Egypt" required>
        </div>
        <div class="col-6">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" required>
        </div>

        <div class="col-6">
            <label for="phone" class="form-label">Phone</label>
            <input type="text" class="form-control" id="phone" required>
        </div>

        <div class="col-12">
            <label for="street" class="form-label">Street Address</label>
            <input type="text" class="form-control" id="street" required>
        </div>

        <div class="col-12">
            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="agree" required>
                <label class="form-check-label" for="agree">
                    You must agree before submitting.
                </label>
            </div>
        </div>

        <div class="col-12">
            <button class="btn btn-success col-12" type="submit" id="btnconfirm" >Confirm form</button>
        </div>

    </div>

</form>
        
       </div>
    </section>
    <div class="toast-container position-fixed top-0 end-0 p-3 mb-5">
        <div id="myToast3" class="toast align-items-center text-bg-success border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    Order Completed Successfully 🎉</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>
    <div class="toast-container position-fixed top-0 end-0 p-3 mb-5">
        <div id="myToast33" class="toast align-items-center text-bg-success border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    Can't Compelete this Order product Out of Stock</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>
    <script type="module">
        import { Order } from '../JS/Checkout.js';
        Order.AddSummaryOrder();
        Order.fillform();
        Order.btnconfirmform();
    </script>
</body>

</html>
