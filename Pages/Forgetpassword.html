<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../Css/Home.css">
    <link rel="stylesheet" href="../Css/Forgetpassword.css">
</head>

<body>
    <div id="navbar-placeholder" class="navbar-placeholder" style="z-index: 1020;"></div>

    <div class="fp-wrapper">
        <div class="fp-card">
            <!-- Icon -->
            <div class="fp-icon">
                <i class="fas fa-lock"></i>
            </div>

            <h2>Forgot Password</h2>
            <p class="fp-subtitle">Enter your details below and we'll help you reset your password.</p>

            <form action="#" method="post" autocomplete="off">
                <!-- Name row -->
                <div class="fp-row">
                    <div class="fp-field">
                        <label for="fname">First Name</label>
                        <input type="text" id="fname" placeholder="Mohamed" required>
                    </div>
                    <div class="fp-field">
                        <label for="lname">Last Name</label>
                        <input type="text" id="lname" placeholder="Khaled" required>
                    </div>
                </div>

                <!-- Email -->
                <div class="fp-field">
                    <label for="fp-email">Email Address</label>
                    <div class="fp-input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="fp-email" placeholder="you@example.com" required>
                    </div>
                </div>

                <!-- Phone -->
                <div class="fp-field">
                    <label for="fp-phone">Phone Number</label>
                    <div class="fp-input-icon">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="fp-phone" placeholder="+20 123 456 7890" required>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="fp-btn" onclick="event.preventDefault();">Reset Password</button>
            </form>

            <p class="fp-back">
                <a href="Login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
            </p>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
