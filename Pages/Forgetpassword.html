<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../Css/Home.css">
    <link rel="stylesheet" href="../Css/Forgetpassword.css">
    <link rel="stylesheet" href="Forgetpassword.css">
</head>

<body>
    <div id="navbar-placeholder" class="navbar-placeholder" style="z-index: 1020;"></div>

    <div class="fp-wrapper">
        <div class="fp-card">
            <!-- Icon -->
            <div class="fp-icon">
                <i class="fas fa-lock"></i>
            </div>

            <h2>Forgot Password</h2>
            <p class="fp-subtitle">Enter your details below and we'll help you reset your password.</p>

            <form action="#" method="post" autocomplete="off">
                <!-- Name row -->
                <div class="fp-row">
                    <div class="fp-field">
                        <label for="fname">First Name</label>
                        <input type="text" id="fname" placeholder="Mohamed" class=" form-control  needs-validation"
                            required>
                        <div class="invalid-feedback">
                            Enter your first name
                        </div>
                    </div>

                    <div class="fp-field">
                        <label for="lname">Last Name</label>
                        <input type="text" id="lname" placeholder="Khaled" class="needs-validation" required>
                        <div class="invalid-feedback">
                            Enter your last name
                        </div>
                    </div>
                </div>

                <!-- Email -->
                <div class="fp-field">
                    <label for="fp-email">Email Address</label>
                    <div class="fp-input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="fp-email" placeholder="you@example.com" class="needs-validation"
                            required>
                        <div class="invalid-feedback">
                            Enter your email
                        </div>
                    </div>
                </div>

                <!-- Phone -->
                <div class="fp-field">
                    <label for="fp-phone">Phone Number</label>
                    <div class="fp-input-icon">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="fp-phone" placeholder="+20 123 456 7890" class="needs-validation"
                            required>
                        <div class="invalid-feedback">
                            Enter your phone number
                        </div>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="fp-btn" id="rest_btn" onclick="event.preventDefault();"
                    data-bs-toggle="modal" data-bs-target="#exampleModal">Reset Password</button>
            </form>

            <p class="fp-back">
                <a href="Login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
            </p>
        </div>



        <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="message" aria-hidden="true"
            data-bs-backdrop="static" data-bs-keyboard="false">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="mod_message"></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <p id="mod_res"></p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>

                    </div>
                </div>
            </div>
        </div>

    </div>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="../Js/ForgetPassword.js"></script>
    <!-- <script type="module" src="ForgetPassword.js"></script>-->

</body>

</html>
