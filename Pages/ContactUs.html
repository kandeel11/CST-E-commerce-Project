<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Ecobazar</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../Css/Home.css">
    <style>
        .contact-info-card {
            background-color: #fff;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            height: 100%;
        }

        .contact-icon {
            color: var(--primary-green);
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .contact-form-container {
            background-color: #fff;
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .form-control:focus {
            border-color: var(--primary-green);
            box-shadow: none;
        }

        .btn-green {
            background-color: var(--primary-green);
            color: #fff;
            font-weight: 600;
            padding: 12px 30px;
            border-radius: 50px;
            border: none;
            width: 100%;
        }

        .btn-green:hover {
            background-color: #009906;
            color: #fff;
        }

        .map-container {
            width: 100%;
            height: 450px;
        }
    </style>
</head>

<body class="bg-light">

    <!-- Navbar Placeholder -->
    <div id="navbar-placeholder"></div>

    <!-- Contact Content -->
    <div class="container py-5 mt-4">
        <div class="row g-4 mb-5">
            <!-- Left Contact Info -->
            <div class="col-lg-3 col-md-4">
                <div class="contact-info-card d-flex flex-column gap-4 justify-content-center">
                    <div>
                        <i class="fas fa-map-marker-alt contact-icon"></i>
                        <p class="mb-0 text-muted small">2715 Ash Dr. San Jose,<br>South Dakota 83475</p>
                    </div>
                    <hr class="text-muted opacity-25 m-0">
                    <div>
                        <i class="far fa-envelope contact-icon"></i>
                        <p class="mb-0 text-muted small">Proxy@gmail.com<br>Help.proxy@gmail.com</p>
                    </div>
                    <hr class="text-muted opacity-25 m-0">
                    <div>
                        <i class="fas fa-phone-alt contact-icon"></i>
                        <p class="mb-0 text-muted small">(219) 555-0114<br>(164) 333-0487</p>
                    </div>
                </div>
            </div>

            <!-- Right Contact Form -->
            <div class="col-lg-9 col-md-8">
                <div class="contact-form-container">
                    <h3 class="fw-bold mb-2">Just Say Hello!</h3>
                    <p class="text-muted small mb-4">Do you fancy saying hi to me or you want to get started with your
                        project and you need my help? Feel free to contact me.</p>

                    <form>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <input type="text" class="form-control bg-light py-2" placeholder="Your Name" required>
                            </div>
                            <div class="col-md-6">
                                <input type="email" class="form-control bg-light py-2" placeholder="Your Email"
                                    required>
                            </div>
                            <div class="col-12">
                                <input type="text" class="form-control bg-light py-2" placeholder="Title" required>
                            </div>
                            <div class="col-12">
                                <textarea class="form-control bg-light py-2" rows="5" placeholder="Subjects"
                                    required></textarea>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-green">Send Message</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Full Width Map -->
    <div class="container-fluid p-0">
        <div class="map-container">
            <iframe src="https://maps.google.com/maps?q=30.79097,30.99893&hl=en&z=15&output=embed" width="100%"
                height="100%" style="border:0;" allowfullscreen="" loading="lazy"
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>
    </div>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../Js/NavBar.js"></script>

    <!-- Load Common Components -->
    <script>
        // Load Navbar
        fetch('NavBar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-placeholder').innerHTML = data;

                // Initialize navbar scripts if they exist
                if (window.initNavBarAuth) window.initNavBarAuth();
                if (window.initBreadcrumb) window.initBreadcrumb();
                if (window.updateCartBadge) window.updateCartBadge();
            })
            .catch(error => console.error('Error loading navbar:', error));

        // Load Footer
        fetch('Footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;

                // Only load Footer.js logic AFTER HTML is injected, to avoid null errors
                const footerScript = document.createElement('script');
                footerScript.src = '../Js/Footer.js';
                document.body.appendChild(footerScript);
            })
            .catch(error => console.error('Error loading footer:', error));
    </script>
</body>

</html>
